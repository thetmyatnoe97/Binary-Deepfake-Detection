dataset:
  coco2014_path:  D:/sweet/binary_deepfake_detection/datasets/coco2014
  coco_fake_path: D:/sweet/binary_deepfake_detection/datasets/coco_fake
  labels: 2
  name: coco_fake

model:
  add_fft_magnitude: true
  add_lbp_channel: false
  add_phase_channel: false
  backbone: BNext-M
  freeze_backbone: true
  use_frequency_attention: true
  attention_position: before_backbone  # ← Input-level only
  attention_type: phase_aware
  use_dropout: true
  dropout_rate: 0.3

test:
  batch_size: 128
  limit_test_batches: 1.0
  mixed_precision: true
  resolution: 192
  seed: 5
  weights_path: ./weights

train:
  accumulation_batches: 4
  batch_size: 32
  epoch_num: 25
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  mixed_precision: true
  resolution: 192
  seed: 5
  learning_rate: 0.001