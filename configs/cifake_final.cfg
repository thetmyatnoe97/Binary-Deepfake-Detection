dataset:
  cifake_path: D:/sweet/binary_deepfake_detection/datasets/cifake
  labels: 2
  name: cifake

model:
  add_fft_magnitude: true
  add_lbp_channel: true
  add_phase_channel: true
  backbone: BNext-M
  freeze_backbone: true
  
  # Best configuration from ablation
  use_frequency_attention: true
  attention_position: both
  attention_type: phase_aware
  
  use_dropout: true
  dropout_rate: 0.25  # Slightly reduced for final model

test:
  batch_size: 128
  limit_test_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5
  weights_path: ./weights

train:
  accumulation_batches: 4
  batch_size: 32
  epoch_num: 25  # Extended for final model
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5
  learning_rate: 0.001