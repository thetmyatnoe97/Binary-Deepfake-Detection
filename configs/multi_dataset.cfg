dataset:
  # Paths for all possible datasets
  coco2014_path: D:\sweet\binary_deepfake_detection\datasets\coco2014
  coco_fake_path: D:\sweet\binary_deepfake_detection\datasets\coco_fake
  dffd_path: D:\sweet\binary_deepfake_detection\datasets\dffd
  cifake_path: D:\sweet\binary_deepfake_detection\datasets\cifake
  face_path: D:\sweet\binary_deepfake_detection\datasets\face
  face140k_path: D:\sweet\binary_deepfake_detection\datasets\face_140k
  forensics_path: D:\sweet\binary_deepfake_detection\datasets\forensics

  labels: 2

  # List of datasets to use for training (multi-dataset)
  train_list:
    - coco_fake
    - dffd
    - cifake
    - face140k
    - face
    - forensics

  # Default dataset name for logging / run labeling
  name: multi_dataset

model:
  add_fft_channel: true
  add_lbp_channel: true
  add_magnitude_channel: false
  backbone: BNext-M
  freeze_backbone: false


train:
  batch_size: 32
  accumulation_batches: 4
  epoch_num: 10
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5

test:
  batch_size: 32
  limit_test_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5
  # Path to the folder where trained weights/checkpoints are saved
  weights_path: .\weights