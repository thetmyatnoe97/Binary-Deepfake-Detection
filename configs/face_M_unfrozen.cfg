dataset:
  face_path: D:\sweet\binary_deepfake_detection\datasets\face
  labels: 2
  name: face
model:
  add_fft_channel: true
  add_lbp_channel: true
  add_magnitude_channel: false
  backbone: BNext-M
  freeze_backbone: false
test:
  batch_size: 32
